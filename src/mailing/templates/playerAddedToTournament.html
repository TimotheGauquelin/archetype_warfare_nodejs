<!-- src/mailing/templates/playerAddedToTournament.html -->
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription à un tournoi</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #f4f6f8;
            font-family: Arial, Helvetica, sans-serif;
            color: #222
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .06);
            padding: 32px
        }

        h2 {
            margin: 0 0 16px;
            font-size: 22px;
            line-height: 1.3;
            color: #1f2937;
            text-align: center
        }

        .content {
            margin-top: 8px
        }

        p {
            margin: 0 0 12px;
            line-height: 1.6;
            color: #374151
        }

        .card {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0
        }

        .footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            color: #6b7280;
            font-size: 12px
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Vous avez été inscrit à un tournoi</h2>
        <div class="content">
            <p>Bonjour <strong>{{username}}</strong>,</p>
            <div class="card">
                <p>Un administrateur vous a inscrit au tournoi <strong>{{tournamentName}}</strong>.</p>
                <p>Vous pouvez consulter les détails du tournoi et vos matchs depuis votre espace.</p>
            </div>
            <p>L'équipe Archetype Battle</p>
        </div>
        <div class="footer">
            <p>Cet email a été envoyé automatiquement, merci de ne pas y répondre.</p>
        </div>
    </div>
</body>

</html>
